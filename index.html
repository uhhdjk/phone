<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发财树资料平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f5f5;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 电脑禁止访问 */
        .forbidden {
            display: none;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
            flex-direction: column;
        }

        /* 首页 */
        .home {
            display: block;
        }
        .top-bar {
            background: #fff;
            padding: 14px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .banner {
            background: #e02b47;
            padding: 16px;
            display: flex;
            align-items: center;
            color: #fff;
        }
        .logo {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-text {
            margin-left: 12px;
            flex: 1;
        }
        .banner-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .online {
            font-size: 14px;
            color: #eee;
            margin-top: 4px;
            text-align: right;
        }
        .banner-menu {
            background: #e02b47;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            color: #fff;
            font-weight: bold;
        }
        .search {
            background: #e02b47;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        .search input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
        }
        .search button {
            background: #fff;
            color: #e02b47;
            border: none;
            border-radius: 30px;
            padding: 0 16px;
            font-weight: bold;
            font-size: 16px;
        }
        .tabs {
            display: flex;
            background: #fff;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 16px;
            color: #666;
        }
        .tab.active {
            color: #e02b47;
            font-weight: bold;
            border-bottom: 3px solid #e02b47;
        }
        .list {
            padding: 10px;
        }
        .item {
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .item-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .item-time {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }
        .item-price {
            color: #e02b47;
            font-weight: bold;
            font-size: 18px;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            max-width: 480px;
            margin: auto;
        }
        .nav-btn {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* 详情页 */
        .detail {
            display: none;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 120px;
        }
        .detail-head {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
        }
        .back {
            font-size: 20px;
            margin-right: 16px;
            cursor: pointer;
        }
        .detail-title {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .detail-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        .detail-tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            color: #666;
        }
        .detail-tab.active {
            color: #7a67ee;
            font-weight: bold;
            border-bottom: 3px solid #7a67ee;
        }
        .detail-list {
            padding: 10px;
        }
        .detail-item {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-item-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 6px;
        }
        .detail-item-time {
            font-size: 14px;
            color: #999;
        }
        .float-back {
            position: fixed;
            right: 20px;
            bottom: 170px;
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        .pay-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 16px;
            border-top: 1px solid #eee;
            max-width: 480px;
            margin: auto;
        }
        .pay-tip {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        .pay-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .pay-price {
            color: red;
            font-size: 24px;
            font-weight: bold;
        }
        .pay-btn {
            flex: 1;
            background: #0095ff;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- 电脑访问提示 -->
<div class="forbidden" id="pcTip">
    <h1>❌ 禁止访问</h1>
    <p>请使用手机访问</p>
</div>

<!-- 首页 -->
<div class="home" id="home">
    <div class="top-bar">知识付费平台</div>
    <div class="banner">
        <div class="logo">
            <img src="https://p26-flow-imagex.byteimg.com/tos-cn-i-a9rns2rl98/e899b665ccad496b805266917f7c2b6e.jpg" alt="发财树LOGO">
        </div>
        <div class="banner-text">
            <div class="banner-title">发财树优质资料</div>
            <div class="online">在线人数:2286</div>
        </div>
    </div>
    <div class="banner-menu">
        <div>主页码</div>
        <div>|</div>
        <div>联系客服</div>
    </div>
    <div class="search">
        <input placeholder="请输入关键字">
        <button>搜索</button>
    </div>
    <div class="tabs">
        <div class="tab active">今日更新</div>
        <div class="tab">专家</div>
    </div>
    <div class="list">
        <div class="item" onclick="goDetail()">
            <div class="item-title">122期 新课资料</div>
            <div class="item-time">05-02 14:38</div>
            <div class="item-price">¥1699</div>
        </div>
        <div class="item" onclick="goDetail()">
            <div class="item-title">122期 原创技巧</div>
            <div class="item-time">05-02 14:34</div>
            <div class="item-price">¥1680</div>
        </div>
    </div>
    <div class="footer-nav">
        <div class="nav-btn">🏠 首页</div>
        <div class="nav-btn">📋 已购</div>
        <div class="nav-btn">👤 我的</div>
    </div>
</div>

<!-- 详情页 -->
<div class="detail" id="detail">
    <div class="detail-head">
        <div class="back" onclick="goHome()">←</div>
        <div class="detail-title">详情</div>
    </div>
    <div class="detail-tabs">
        <div class="detail-tab">今日更新</div>
        <div class="detail-tab active">往期更新</div>
    </div>
    <div class="detail-list">
        <div class="detail-item">
            <div class="detail-item-title">123期 新课资料</div>
            <div class="detail-item-time">发布于：05-03 17:09</div>
        </div>
        <div class="detail-item">
            <div class="detail-item-title">122期 原创技巧</div>
            <div class="detail-item-time">发布于：05-02 14:38</div>
        </div>
    </div>
    <div class="float-back" onclick="goHome()">↩️</div>
    <div class="pay-bar">
        <div class="pay-tip">打赏后重新进入即可查看内容</div>
        <div class="pay-row">
            <div class="pay-price">¥1699</div>
            <button class="pay-btn">支付宝打赏</button>
        </div>
    </div>
</div>

<script>
    // 判断手机/电脑
    function isPhone() {
        return /Android|iPhone|iPad/i.test(navigator.userAgent);
    }
    if (!isPhone()) {
        document.getElementById("pcTip").style.display = "flex";
        document.getElementById("home").style.display = "none";
    }

    // 去详情页
    function goDetail() {
        document.getElementById("home").style.display = "none";
        document.getElementById("detail").style.display = "block";
    }

    // 返回首页
    function goHome() {
        document.getElementById("detail").style.display = "none";
        document.getElementById("home").style.display = "block";
    }
</script>

</body>
</html>
