<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发财树资料平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f5f5;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 电脑禁止访问 */
        .forbidden {
            display: none;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
            flex-direction: column;
        }
        .forbidden h1 {
            color: #ff4444;
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* 首页样式 */
        .home {
            display: block;
        }
        .top-bar {
            background: #fff;
            padding: 14px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .banner {
            background: #e02b47;
            padding: 16px;
            display: flex;
            align-items: center;
            color: #fff;
        }
        .logo-box {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            background: #fff;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-info {
            flex: 1;
            margin-left: 12px;
        }
        .banner-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
        }
        .online-count {
            font-size: 14px;
            color: #eee;
            text-align: right;
        }
        .banner-menu {
            background: #e02b47;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }
        .search-area {
            background: #e02b47;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
        }
        .search-btn {
            background: #fff;
            color: #e02b47;
            border: none;
            border-radius: 30px;
            padding: 0 16px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .tab-bar {
            display: flex;
            background: #fff;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 16px;
            color: #666;
        }
        .tab-item.active {
            color: #e02b47;
            font-weight: bold;
            border-bottom: 3px solid #e02b47;
        }
        .course-list {
            padding: 10px;
        }
        .course-item {
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .course-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .course-time {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }
        .course-price {
            color: #e02b47;
            font-weight: bold;
            font-size: 18px;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            max-width: 480px;
            margin: auto;
        }
        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* 详情页样式 */
        .detail {
            display: none;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 120px;
        }
        .detail-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
        }
        .back-btn {
            font-size: 20px;
            margin-right: 16px;
            cursor: pointer;
        }
        .detail-title {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .detail-tab-bar {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        .detail-tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            color: #666;
        }
        .detail-tab.active {
            color: #7a67ee;
            font-weight: bold;
            border-bottom: 3px solid #7a67ee;
        }
        .detail-course-list {
            padding: 10px;
        }
        .detail-course-item {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-course-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 6px;
        }
        .detail-course-time {
            font-size: 14px;
            color: #999;
        }
        .float-back {
            position: fixed;
            right: 20px;
            bottom: 170px;
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        .pay-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 16px;
            border-top: 1px solid #eee;
            max-width: 480px;
            margin: auto;
        }
        .pay-tip {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        .pay-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .pay-price {
            color: red;
            font-size: 24px;
            font-weight: bold;
        }
        .pay-btn {
            flex: 1;
            background: #0095ff;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<script>
    // 判断设备：手机/电脑
    function isMobile() {
        return /Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(navigator.userAgent);
    }
    
    // 初始化页面
    window.onload = function() {
        if (!isMobile()) {
            document.getElementById("pcTip").style.display = "flex";
            document.getElementById("home").style.display = "none";
        }
    }

    // 跳转到详情页
    function goDetail() {
        document.getElementById("home").style.display = "none";
        document.getElementById("detail").style.display = "block";
    }

    // 返回首页
    function goHome() {
        document.getElementById("detail").style.display = "none";
        document.getElementById("home").style.display = "block";
    }
