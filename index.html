<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>手机专属访问</title>
</head>
<body>
<script>
let u = navigator.userAgent.toLowerCase();
let sj = /android|iphone/.test(u);
if(sj){
    // 手机自动跳转
    location.href = "https://www.baidu.com";
}else{
    document.body.innerHTML = '<div style="text-align:center;margin-top:80px;font-size:20px;color:#666;">请使用手机扫码访问</div>';
}
</script>
</body>
</html>
