<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程解锁验证</title>
    <style>
        body { font-family: "微软雅黑", sans-serif; max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: #06b46c; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>课程解锁验证</h1>
        <div class="form-group">
            <label for="courseId">选择课程</label>
            <select id="courseId">
                <!-- 这里我先给你写几个示例，你可以按需求扩展到37门 -->
                <option value="1">课程1</option>
                <option value="2">课程2</option>
                <option value="27">课程27</option>
                <option value="28">课程28</option>
            </select>
        </div>
        <div class="form-group">
            <label for="password">输入课程密码</label>
            <input type="text" id="password" placeholder="请输入6位课程密码">
        </div>
        <button id="verifyBtn">验证并解锁</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        // 这里填写你当前的ngrok地址（每次重启ngrok要更新这个）
        const API_BASE = "https://ferris-phrase-monsieur.ngrok-free.dev";

        const verifyBtn = document.getElementById("verifyBtn");
        const statusEl = document.getElementById("status");

        verifyBtn.addEventListener("click", async () => {
            const courseId = document.getElementById("courseId").value;
            const password = document.getElementById("password").value.trim();

            if (!password || password.length !== 6) {
                statusEl.className = "status error";
                statusEl.textContent = "请输入正确的6位密码";
                return;
            }

            verifyBtn.disabled = true;
            statusEl.className = "status";
            statusEl.textContent = "正在验证中...";

            try {
                const res = await fetch(`${API_BASE}/api/verify`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ courseId, password })
                });

                const data = await res.json();

                if (data.success) {
                    statusEl.className = "status success";
                    statusEl.textContent = "✅ 验证成功，课件即将解锁！";
                    // 验证成功后，跳转到课件地址（你可以在这里写你的课件链接）
                    setTimeout(() => {
                        alert("课程解锁成功！\n你可以在这里跳转到课件页面。");
                        // window.location.href = "你的课件地址.html";
                    }, 1500);
                } else {
                    statusEl.className = "status error";
                    statusEl.textContent = "❌ 验证失败：" + data.message;
                }
            } catch (err) {
                statusEl.className = "status error";
                statusEl.textContent = "网络错误，请稍后重试";
            } finally {
                verifyBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
