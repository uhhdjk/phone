<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课程密码管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
        body { background: #f1f5f9; padding: 30px; }
        .box { max-width: 700px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 0 12px #00000015; }
        h2 { text-align: center; margin-bottom: 25px; color: #222; }
        .status { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .online { background: #ecfdf3; color: #06b46c; }
        .btn { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; margin: 10px 0; }
        .btn:hover { background: #1d4ed8; }
        .pwd-list { margin-top: 20px; max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .course-name { flex: 1; text-align: left; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .course-password { flex-shrink: 0; margin-left: 15px; color: #d97706; font-weight: bold; min-width: 70px; text-align: right; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 课程密码管理面板</h2>
        <div id="statusBox" class="status">检测服务器中...</div>
        
        <button class="btn" onclick="generateAll()">🔁 批量生成新密码（37门课程）</button>
        <button class="btn" onclick="refreshPwd()">📄 刷新当前密码列表</button>

        <div class="pwd-list" id="pwdList"></div>
        
    </div>

    <script>
        // 作者管理面板直接访问本地服务器
        const SERVER_URL = "http://localhost:3000";

        // 从localStorage获取课程名称（与index.html保持同步）
        function getCourseNames() {
            // 优先从localStorage读取
            const stored = localStorage.getItem('courses');
            if (stored) {
                try {
                    const courses = JSON.parse(stored);
                    const names = {};
                    courses.forEach(course => {
                        names[course.id] = course.title;
                    });
                    return names;
                } catch (e) {
                    console.log('解析课程数据失败:', e);
                }
            }
            // 如果localStorage中没有，使用默认数据（与index.html同步）
            return {
                1: '128期 新&奥新[金手指】一肖一码中特',
                2: '128期 新&奥新【爆运】一肖一码中特',
                3: '128期 新&奥新【幸运星】两码中特',
                4: '128期 新&奥新【鸿运连连】两码中特',
                5: '128期 新&奥新【鸿运连连】两码中特',
                6: '128期 新&奥新【安溪龙】三码中特',
                7: '128期 新&奥新【南天霸】三码中特',
                8: '128期 新&奥新【三太子】三码中特',
                9: '128期 新&奥新【暴力猫】四码中特',
                10: '128期 新&奥新【暴富财神】四码中特',
                11: '128期 新&奥新【吉祥符】四码中特',
                12: '128期 新&澳【天天来财】五码中特',
                13: '128期 新&澳【澳财童子】五码中特',
                14: '128期 新&澳【招财神童】五码中特',
                15: '128期 新&奥新【澳门星姐】六码中特',
                16: '128期 新&奥新【爆运财神】六码中特',
                17: '128期 新&奥新【鸿运来财】六码中特',
                18: '128期 新&奥新【天天暴富】八码中特',
                19: '128期 新&奥新【澳门财神】八码中特',
                20: '128期 新&奥新【吉祥帝国】八码中特',
                21: '128期 新&奥新【爆发】三中三一组',
                22: '128期 新&奥新【小李飞刀】三中三一组',
                23: '128期 新&奥新【天天旺财】三中三两组',
                24: '128期 新&奥新【荷仙姑】三中三两组',
                25: '128期 新&奥新【澳门财神】八码中特',
                26: '128期 新&奥新【吉祥帝国】八码中特',
                27: '128期 新&奥新[爆发】三中三一组',
                28: '128期 新&奥新【小李飞刀】三中三一组',
                29: '128期 新&奥新【天天旺财】三中三两组',
                30: '128期 新&奥新[荷仙姑】三中三两组',
                31: '128期 新&奥新【八魔女】三中三三组',
                32: '128期 新&奥新[金钱豹】三中三三组',
                33: '128期 新&奥新[澳门三姐】三中三四组',
                34: '128期 新&奥新[安溪财富】三中三四组',
                35: '128期 新&澳新【好运来】两肖中特',
                36: '128期 新&澳新【惊雷】一肖中特',
                37: '128期 &澳【好彩头】十码中特',
                38: '128期 &澳[黄金运】十码中特',
                39: '128期 新&澳【财富爆运】八码中特',
                40: '128期 新&澳特【财富爆】八码中特',
                41: '128期 新&奥新[招财宝】五码中特',
                42: '128期 新&奥新[运金财来】五码中特',
                43: '128期 新&奥新[五福星】五码中特'
            };
        }
        
        // 获取课程名称（每次刷新都重新获取，确保同步）
        let courseNames = getCourseNames();

        async function checkStatus() {
            const box = document.getElementById("statusBox");
            try {
                await fetch(`${SERVER_URL}/api/status`);
                box.className = "status online";
                box.innerText = "✅ 服务器在线，正常工作";
            } catch (e) {
                box.innerText = "❌ 服务器离线";
            }
        }

        async function refreshPwd() {
            // 每次刷新都重新获取最新的课程名称，确保与index.html同步
            courseNames = getCourseNames();
            
            const list = document.getElementById("pwdList");
            list.innerHTML = "加载中...";
            
            try {
                const res = await fetch(`${SERVER_URL}/api/passwords-with-names`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ courseNames: courseNames })
                });
                const data = await res.json();
                
                let html = "";
                data.courses.forEach(course => {
                    html += `<div class="item">
                        <span class="course-name" title="${course.name}">${course.name}</span>
                        <span class="course-password">${course.password}</span>
                    </div>`;
                });
                list.innerHTML = html;
            } catch (e) {
                // 如果服务器不可用，使用本地计算
                let html = "";
                // 使用Object.keys获取实际的课程数量，确保与index.html同步
                const maxCourseId = Math.max(...Object.keys(courseNames).map(Number));
                for (let i = 1; i <= maxCourseId; i++) {
                    const password = generatePassword(i);
                    html += `<div class="item">
                        <span class="course-name" title="${courseNames[i] || `课程 ${i}`}">${courseNames[i] || `课程 ${i}`}</span>
                        <span class="course-password">${password}</span>
                    </div>`;
                }
                list.innerHTML = html;
            }
        }

        // 密码生成算法（与服务器端相同）
        function generatePassword(courseId) {
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            const hash = parseInt(dateStr) * 1000 + courseId * 7 + 123456;
            return String(hash).slice(-6);
        }

        async function generateAll() {
            if (!confirm("确定生成新密码？旧密码立即失效！")) return;
            await fetch(`${SERVER_URL}/api/generate-all`, {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            });
            alert("✅ 密码已更新！");
            refreshPwd();
        }

        checkStatus();
        refreshPwd();
    </script>
</body>
</html>
